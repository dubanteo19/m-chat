# Database Strategy for Development
quarkus.hibernate-orm.database.generation=update
#quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false
quarkus.jackson.fail-on-empty-beans=false
quarkus.datasource.devservices.port=5432
quarkus.datasource.devservices.reuse=true
quarkus.datasource.devservices.volumes."/home/isv51/dev/m-chat/postgres_data"=/var/lib/postgresql

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173,http://192.168.1.81:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS